services:
  - type: web
    name: solar-lead-api
    runtime: node
    rootDir: apps/api
    buildCommand: pnpm install --frozen-lockfile --prod=false && pnpm build
    startCommand: NODE_ENV=production pnpm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: REDIS_URL
        sync: false
      - key: REDIS_MAX_RETRIES
        value: 3
      - key: BULL_NOTIFICATION_QUEUE
        value: notification-queue
      - key: WEB_ORIGIN
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_API_BASE_URL
        value: https://api.razorpay.com
      - key: PAYMENT_REGISTERED_NAME
        value: Razorpay Payments Private Limited
      - key: PAYMENT_CIN
        sync: false
      - key: PAYMENT_PAN
        sync: false
      - key: PAYMENT_TAN
        sync: false
      - key: PAYMENT_GST
        sync: false
      - key: SMS_PROVIDER
        value: console
      - key: EMAIL_PROVIDER
        value: console
      - key: EMAIL_FROM
        value: no-reply@solar.local
      - key: WHATSAPP_PROVIDER
        value: console
      - key: MSG91_ROUTE
        value: "4"
      - key: MSG91_COUNTRY
        value: "91"

  - type: worker
    name: solar-lead-notification-worker
    runtime: node
    rootDir: apps/api
    buildCommand: pnpm install --frozen-lockfile --prod=false && pnpm build
    startCommand: NODE_ENV=production pnpm worker
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: REDIS_URL
        sync: false
      - key: REDIS_MAX_RETRIES
        value: 3
      - key: BULL_NOTIFICATION_QUEUE
        value: notification-queue
      - key: SMS_PROVIDER
        value: console
      - key: EMAIL_PROVIDER
        value: console
      - key: EMAIL_FROM
        value: no-reply@solar.local
      - key: WHATSAPP_PROVIDER
        value: console
      - key: MSG91_ROUTE
        value: "4"
      - key: MSG91_COUNTRY
        value: "91"

  - type: web
    name: solar-lead-web
    runtime: node
    rootDir: apps/web
    buildCommand: pnpm install --frozen-lockfile && pnpm build
    startCommand: NODE_ENV=production pnpm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NEXT_PUBLIC_API_BASE_URL
        value: https://solar-lead.onrender.com
      - key: NEXT_PUBLIC_API_URL
        value: https://solar-lead.onrender.com
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_API_KEY
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_PROJECT_ID
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_APP_ID
        sync: false
      - key: NEXT_PUBLIC_RECAPTCHA_SITE_KEY
        sync: false
